<!DOCTYPE html>
<html>
<head>
  <title>Find My Phone</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 400px; margin-top: 10px; }
    input, button { padding: 10px; margin: 5px; }
  </style>
</head>
<body>

<h2>Find My Phone</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<br><br>
<button onclick="sendLocation()">Update Lokasi</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let currentUser = null;
let map, marker;

function register() {
  fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  }).then(res => res.json()).then(data => {
    alert("Register: " + data.success);
  });
}

function login() {
  fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  }).then(res => res.json()).then(data => {
    if (data.success) {
      currentUser = data.user.username;
      alert("Login berhasil");
      initMap();
    } else {
      alert("Login gagal");
    }
  });
}

function initMap() {
  map = L.map('map').setView([0,0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function sendLocation() {
  if (!currentUser) return alert("Login dulu!");

  navigator.geolocation.getCurrentPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    fetch("http://localhost:3000/update-location", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        username: currentUser,
        lat,
        lon
      })
    });

    if (marker) map.removeLayer(marker);

    marker = L.marker([lat, lon]).addTo(map)
      .bindPopup("Lokasi kamu").openPopup();

    map.setView([lat, lon], 15);
  });
}
</script>

</body>
</html>
